<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEARCH 22.5</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <h1>SEARCH 22.5</h1>
    </header>

    <main class="split-view">
      <section class="left-panel">
        <div class="editor-container">
          <svg id="editorSvg" viewBox="0 0 800 560" role="img" aria-label="Interactive tree editor"></svg>
        </div>
        
        <div class="controls-container">
          <div class="toggles">
            <label class="toggle-label" title="If checked, restricts search to symmetrically diagonal databases.">
              <input type="checkbox" id="diagToggle" />
              Diagonal Symmetry Only
            </label>
            <label class="toggle-label">
              Top results: 
              <input id="resultCount" type="number" min="1" max="40" value="8" />
            </label>
          </div>
          
          <div class="actions">
            <button id="runQuery">Run Query</button>
            <button id="resetTree" class="secondary">Reset Tree</button>
          </div>
          
          <p id="status" class="status">Ready.</p>
        </div>
      </section>

      <section class="right-panel">
        <div class="section-head">
          <h2>Results</h2>
          <span id="resultSummary">No query run yet.</span>
        </div>
        <div id="resultsGrid" class="results-grid"></div>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn" aria-label="Close modal">✕</button>
      <div class="modal-header">
        <h2 id="modalTitle">Detail View</h2>
      </div>
      <div id="modalGrid" class="modal-grid">
        </div>
      <div class="modal-footer">
        <button id="downloadCpBtn">Export crease pattern</button>
      </div>
    </div>
  </div>

  <script src="/app.js"></script>
</body>
</html>
