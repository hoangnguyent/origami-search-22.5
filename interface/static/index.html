<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEARCH 22.5</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="top-bar-left">
        <h1 id="appTitle">SEARCH 22.5</h1>
      </div>
      <div class="top-bar-actions">
        <button id="settingsBtn" class="icon-btn" type="button" aria-label="Open settings" title="Settings">
          <img src="/assets/gear.svg" alt="" aria-hidden="true" />
        </button>
      </div>
    </header>

    <main class="split-view">
      <section class="left-panel">
        <div class="editor-container">
          <svg id="editorSvg" viewBox="0 0 800 560" role="img" aria-label="Interactive tree editor"></svg>
          <div id="mobileEditorControls" class="editor-mobile-controls mobile-only" aria-label="Editor actions">
            <button id="deleteNodeBtn" class="icon-btn editor-action-btn editor-delete-btn" type="button" aria-label="Delete selected node" title="Delete selected node">
              <img src="/assets/trash.svg" alt="" aria-hidden="true" />
            </button>
            <div class="editor-nudge-pad" role="group" aria-label="Move selected node">
              <span class="editor-nudge-spacer editor-nudge-up-spacer"></span>
              <button id="moveNodeUpBtn" class="icon-btn editor-action-btn editor-nudge-btn editor-nudge-up" type="button" aria-label="Move selected node up" title="Move selected node up">
                <img src="/assets/arrow-up.svg" alt="" aria-hidden="true" />
              </button>
              <span class="editor-nudge-spacer editor-nudge-right-spacer"></span>
              <button id="moveNodeLeftBtn" class="icon-btn editor-action-btn editor-nudge-btn editor-nudge-left" type="button" aria-label="Move selected node left" title="Move selected node left">
                <img src="/assets/arrow-left.svg" alt="" aria-hidden="true" />
              </button>
              <span class="editor-nudge-spacer editor-nudge-center-spacer"></span>
              <button id="moveNodeRightBtn" class="icon-btn editor-action-btn editor-nudge-btn editor-nudge-right" type="button" aria-label="Move selected node right" title="Move selected node right">
                <img src="/assets/arrow-right.svg" alt="" aria-hidden="true" />
              </button>
              <span class="editor-nudge-spacer editor-nudge-left-spacer"></span>
              <button id="moveNodeDownBtn" class="icon-btn editor-action-btn editor-nudge-btn editor-nudge-down" type="button" aria-label="Move selected node down" title="Move selected node down">
                <img src="/assets/arrow-down.svg" alt="" aria-hidden="true" />
              </button>
              <span class="editor-nudge-spacer editor-nudge-down-spacer"></span>
            </div>
          </div>
        </div>
          <div class="controls-container">
            <div class="toggles">
                <label class="toggle-label" title="If not checked, restricts search to symmetrically diagonal databases.">
                <input type="checkbox" id="diagToggle" />
                  <span id="diagToggleLabel">Allow asymmetric solutions</span>
              </label>
              <label class="toggle-label">
                  <span id="topResultsLabel">Top results:</span>
                <input id="resultCount" type="number" min="1" max="100" value="10" />
              </label>
              <label class="toggle-label" style="justify-content: center;">
                  <input id="randomNodeCount" type="number" min="2" max="50" value="15" title="Target number of nodes" />
                  <span id="randomLeafNodesLabel">Random leaf nodes</span>
              </label>
            </div>
            
            <div class="actions">
              <!-- <button id="runQuery">Run Query</button> -->
              <button id="resetTree" class="secondary">Reset Tree</button>
              <button id="randomTreeBtn" class="secondary">Random Tree</button>
            </div>

            <div class="actions" style="margin-top: 12px; grid-template-columns: 1fr;">
              <button id="runQuery">Run Query</button>

            </div>
            
            <p id="status" class="status">Ready.</p>
          </div>
          <!-- <p id="status" class="status">Ready.</p>
        </div> -->
      </section>

      <section class="right-panel">
        <div class="section-head">
          <div class="results-head-left">
            <h2 id="resultsHeading">Results</h2>
            <label for="resultsThumbMode" class="toggle-label">
              <span>Thumbnail display:</span>
              <select id="resultsThumbMode" aria-label="Results thumbnail type">
                <option value="cp">Crease pattern</option>
                <option value="tree">Tree</option>
                <option value="packing">Packing</option>
                <!-- <option value="fold">Folded state</option> -->
              </select>
            </label>
          </div>
          <span id="resultSummary">No query run yet.</span>
        </div>
        <div id="resultsGrid" class="results-grid"></div>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal-overlay hidden" aria-hidden="true">
    <div class="modal-content detail-modal-content">
      <button id="detailPrevBtn" class="modal-nav-btn modal-nav-prev" type="button" aria-label="Previous result" title="Previous result">‹</button>
      <button id="detailNextBtn" class="modal-nav-btn modal-nav-next" type="button" aria-label="Next result" title="Next result">›</button>
      <button id="closeModal" class="close-btn" type="button" aria-label="Close modal">✕</button>
      <div class="modal-header detail-modal-header">
        <div class="modal-title-group">
          <h2 id="modalTitle">Detail View</h2>
        </div>
        <p id="modalMeta" class="modal-meta"></p>
      </div>
      <div id="modalGrid" class="detail-modal-body"></div>
      <div class="modal-footer">
        <button id="downloadCpBtn" type="button">Export crease pattern as .FOLD</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal-content settings-content">
      <button id="closeSettingsModal" class="close-btn" aria-label="Close settings">✕</button>
      <div class="modal-header">
        <h2 id="settingsHeading">Settings</h2>
      </div>
      <div class="settings-panel">
        <label class="setting-row" for="themeSelect">
          <div>
            <strong id="themeLabel">Theme</strong>
          </div>
          <select id="themeSelect" class="setting-select" aria-label="Theme preference">
            <option value="system">Use system settings</option>
            <option value="light">Light mode</option>
            <option value="dark">Dark mode</option>
          </select>
        </label>
        <label class="setting-row" for="languageSelect">
          <div>
            <strong id="languageLabel">Language</strong>
          </div>
          <select id="languageSelect" class="setting-select" aria-label="Language preference">
            <option value="en">🇺🇸 English</option>
            <option value="en">Placeholder language</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <script type="module" src="/interface/static/app.js"></script>
</body>
</html>
