<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SEARCH 22.5</title>
  <link rel="stylesheet" href="/styles.css" />
</head>
<body>
  <div class="app-shell">
    <header class="top-bar">
      <div class="top-bar-left">
        <h1 id="appTitle">SEARCH 22.5</h1>
      </div>
      <div class="top-bar-actions">
        <button id="settingsBtn" class="icon-btn" type="button" aria-label="Open settings" title="Settings">
          <img src="/assets/gear.svg" alt="" aria-hidden="true" />
        </button>
      </div>
    </header>

    <main class="split-view">
      <section class="left-panel">
        <div class="editor-container">
          <svg id="editorSvg" viewBox="0 0 800 560" role="img" aria-label="Interactive tree editor"></svg>
        </div>
          <div class="controls-container">
            <div class="toggles">
                <label class="toggle-label" title="If not checked, restricts search to symmetrically diagonal databases.">
                <input type="checkbox" id="diagToggle" />
                  <span id="diagToggleLabel">Allow asymmetric solutions</span>
              </label>
              <label class="toggle-label">
                  <span id="topResultsLabel">Top results:</span>
                <input id="resultCount" type="number" min="1" max="100" value="10" />
              </label>
              <label class="toggle-label" style="justify-content: center;">
                  <input id="randomNodeCount" type="number" min="2" max="50" value="15" title="Target number of nodes" />
                  <span id="randomLeafNodesLabel">Random leaf nodes</span>
              </label>
            </div>
            
            <div class="actions">
              <!-- <button id="runQuery">Run Query</button> -->
              <button id="resetTree" class="secondary">Reset Tree</button>
              <button id="randomTreeBtn" class="secondary">Random Tree</button>
            </div>

            <div class="actions" style="margin-top: 12px; grid-template-columns: 1fr;">
              <button id="runQuery">Run Query</button>

            </div>
            
            <p id="status" class="status">Ready.</p>
          </div>
          <!-- <p id="status" class="status">Ready.</p>
        </div> -->
      </section>

      <section class="right-panel">
        <div class="section-head">
          <div class="results-head-left">
            <h2 id="resultsHeading">Results</h2>
            <label for="resultsThumbMode" class="toggle-label">
              <span>Thumbnail display:</span>
              <select id="resultsThumbMode" aria-label="Results thumbnail type">
                <option value="cp">Crease pattern</option>
                <option value="tree">Tree</option>
              </select>
            </label>
          </div>
          <span id="resultSummary">No query run yet.</span>
        </div>
        <div id="resultsGrid" class="results-grid"></div>
      </section>
    </main>
  </div>

  <div id="detailModal" class="modal-overlay hidden">
    <div class="modal-content">
      <button id="closeModal" class="close-btn" aria-label="Close modal">✕</button>
      <div class="modal-header">
        <h2 id="modalTitle">Detail View</h2>
      </div>
      <div id="modalGrid" class="modal-grid">
        </div>
      <div class="modal-footer">
        <button id="downloadCpBtn">Export crease pattern as .FOLD</button>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="modal-overlay hidden">
    <div class="modal-content settings-content">
      <button id="closeSettingsModal" class="close-btn" aria-label="Close settings">✕</button>
      <div class="modal-header">
        <h2 id="settingsHeading">Settings</h2>
      </div>
      <div class="settings-panel">
        <label class="setting-row" for="themeSelect">
          <div>
            <strong id="themeLabel">Theme</strong>
          </div>
          <select id="themeSelect" class="setting-select" aria-label="Theme preference">
            <option value="system">Use system settings</option>
            <option value="light">Light mode</option>
            <option value="dark">Dark mode</option>
          </select>
        </label>
        <label class="setting-row" for="languageSelect">
          <div>
            <strong id="languageLabel">Language</strong>
          </div>
          <select id="languageSelect" class="setting-select" aria-label="Language preference">
            <option value="en">🇺🇸 English</option>
            <option value="en">Placeholder language</option>
          </select>
        </label>
      </div>
    </div>
  </div>

  <script src="/i18n.js"></script>
  <script src="/app.js"></script>
</body>
</html>
